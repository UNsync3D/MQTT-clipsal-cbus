# ============================================================
# MQTT Clipsal C-Bus — Configuration
# Edit this file to match your installation.
# ============================================================

# --- Clipsal 5500SHAC ---
cbus:
  host: "192.168.1.250"     # IP address of your 5500SHAC
  port: 8087                # Default WebSocket port
  network: 0                # C-Bus network number (0 for most residential)

# --- MQTT Broker ---
mqtt:
  host: "localhost"         # MQTT broker IP or hostname
                            # Use "core-mosquitto" for Home Assistant OS
  port: 1883
  client_id: "mqtt_clipsal_cbus"
  username: ""              # Leave blank if no authentication
  password: ""

# --- Home Assistant ---
homeassistant:
  discovery_prefix: "homeassistant"

# ============================================================
# Devices — edit to match your C-Bus installation
# ============================================================

# --- Lights (App 56) — value 0-255 ---
lights:
  - name: "Living Room"
    group: 1
  - name: "Kitchen"
    group: 2
  # Add more lights here...

# --- Fans (App 56) — on/off only ---
fans:
  - name: "Bathroom Fan"
    group: 10
  # Add more fans here...

# --- Blinds & Curtains (App 56) — value 0-255 ---
covers:
  - name: "Living Room Blind"
    group: 20
    device_class: blind       # blind or curtain
  - name: "Bedroom Curtain"
    group: 21
    device_class: curtain
  # Add more covers here...

# --- Scenes (App 202) — trigger with value 255 ---
scenes:
  - name: "Goodbye"
    group: 0
  - name: "Welcome Home"
    group: 1
  - name: "Goodnight"
    group: 2
  # Add more scenes here...

# --- Air Conditioning (App 48 via Coolmaster) ---
ac_zones:
  - id: living              # Unique ID (no spaces)
    name: "Living Room"     # Display name in HA
    power_group: 8          # App 48 group for power on/off
    mode_group: 11          # App 48 group for mode (heat/cool/auto)
    fan_group: 10           # App 48 group for fan speed
    temp_up_group: 20       # App 48 group — pulse to raise setpoint 1°C
    temp_down_group: 21     # App 48 group — pulse to lower setpoint 1°C
    current_temp_group: 4   # App 250 group — current temperature (read-only)
    set_temp_group: 33      # App 250 group — setpoint temperature (read-only)
  # Add more AC zones here...

# --- Motion Sensors (App 56) — value > 0 = detected ---
motion_sensors:
  - name: "Hallway Motion"
    group: 30
  # Add more motion sensors here...

# --- Alarms (App 208) — value > 0 = alarm ---
alarms:
  - name: "Smoke Alarm"
    group: 9
    device_class: smoke     # smoke, gas, or moisture
  # Add more alarms here...
